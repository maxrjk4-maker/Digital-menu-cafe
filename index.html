<!DOCTYPE html>
<html>
<head>
    <title>Sharma Cafe Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 1. QR Library jodi -->
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <!-- Supabase Library Jodi -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #fff8e1; 
            font-family: Arial;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #e65100; }
        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #e65100;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 10px;
            width: 95%;
        }
        #menuList {
            text-align: left;
            margin-top: 20px;
        }
        .menu-item {
            background: #fff3e0;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
        /* 2. QR ke liye style */
        #qrcode {
            margin: 20px auto;
            padding: 10px;
            background: white;
            width: fit-content;
        }
        .btn-green {
            background: #2e7d32 !important;
        }
        .link-text {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sharma Cafe Menu</h1>
        <p>Item Jodo</p>
        
        <input type="text" id="itemName" placeholder="Item ka Naam: Chai">
        <input type="number" id="itemPrice" placeholder="Price: 20">
        <button onclick="jodoItem()">Menu Mein Jodo</button>
        
        <div id="menuList">
            <h3>Aaj Ka Menu:</h3>
        </div>
        
        <!-- 3. QR Button + QR Dikhega yahan -->
        <button class="btn-green" onclick="banaoQR()">Menu Ka QR Banao</button>
        <div id="qrcode"></div>
        <div id="qrLink" class="link-text"></div>
    </div>

    <script>
        // 👇 YAHAN APNI 3 CHEEZ DAALNI HAI
        const SUPABASE_URL = 'https://dvuosaxbenphiwqknwia.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2dW9zYXhiZW5waGl3cWtud2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Mzg0OTAsImV4cCI6MjA5NDMxNDQ5MH0.IqRBS68f3PFGi9mtlwRCmUeGB6999snjHSEtykraFJQ'
        const CAFE_ID = 'b4e42238-a89a-4f2e-a4a6-8c82569f6495'
        
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
        
        // Menu ka data store karne ke liye
        let menuData = [];
        
        // Page load hote hi DB se menu load karo
        async function loadMenuFromDB() {
            const { data, error } = await db.from('menu_items').select('*').eq('cafe_id', CAFE_ID)
            if (error) { 
                alert('Menu load karne mein error: ' + error.message); 
                return 
            }
            menuData = data
            document.getElementById("menuList").innerHTML = '<h3>Aaj Ka Menu:</h3>'
            data.forEach(item => {
                let nayaItem = document.createElement("div");
                nayaItem.className = "menu-item";
                nayaItem.innerHTML = `<span>${item.name}</span> <span>₹${item.price}</span>`;
                document.getElementById("menuList").appendChild(nayaItem);
            })
        }
        
        async function jodoItem() {
            let naam = document.getElementById("itemName").value;
            let daam = document.getElementById("itemPrice").value;
            
            if(naam == "" || daam == "") {
                alert("Bhai naam aur daam dono bhar");
                return;
            }
            
            // Supabase mein save karo
            const { error } = await db.from('menu_items').insert([{ cafe_id: CAFE_ID, name: naam, price: daam }])
            if (error) { 
                alert('Item add karne mein error: ' + error.message); 
                return 
            }
            
            // DB se dobara load karo taaki ID mil jaye
            loadMenuFromDB()
            
            document.getElementById("itemName").value = "";
            document.getElementById("itemPrice").value = "";
        }
        
        // 4. QR Banane ka function - UPDATED
        function banaoQR() {
            if(menuData.length == 0) {
                alert("Pehle menu mein item to jodo bhai");
                return;
            }
            
            // Ye line change ki hai - Ab sahi link banega
            const currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            const menuURL = currentPath + 'menu.html?cafe=' + CAFE_ID;
            
            // Purana QR saaf karo
            document.getElementById("qrcode").innerHTML = "";
            document.getElementById("qrLink").innerHTML = "";
            
            // Naya QR banao
            new QRCode(document.getElementById("qrcode"), {
                text: menuURL,
                width: 200,
                height: 200,
            });
            
            // Link bhi niche dikha do testing ke liye
            document.getElementById("qrLink").innerHTML = `Link: <a href="${menuURL}" target="_blank">${menuURL}</a>`;
        }
        
        // Page khulte hi menu load kar do
        loadMenuFromDB()
    </script>
</body>
</html>
