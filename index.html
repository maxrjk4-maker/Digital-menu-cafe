<!DOCTYPE html>
<html>
<head>
    <title>S Cafe Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #fff8e1; 
            font-family: Arial;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #e65100; }
        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #e65100;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 10px;
            width: 95%;
            cursor: pointer;
        }
        #menuList {
            text-align: left;
            margin-top: 20px;
        }
        .menu-item {
            background: #fff3e0;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info {
            flex: 1;
        }
        .item-actions button {
            width: auto;
            padding: 6px 12px;
            margin: 0 2px;
            font-size: 14px;
        }
        .btn-delete { background: #d32f2f !important; }
        .btn-edit { background: #1976d2 !important; }
        .btn-green { background: #2e7d32 !important; }
        .btn-cancel { background: #757575 !important; }
        #qrcode {
            margin: 20px auto;
            padding: 10px;
            background: white;
            width: fit-content;
        }
        .link-text {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            word-break: break-all;
        }
        #editMode {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>S Cafe Menu</h1>
        <p>Item Jodo / Edit Karo</p>
        
        <div id="editMode">
            <b>Edit Mode On</b>
            <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
        </div>
        
        <input type="text" id="itemName" placeholder="Item ka Naam: Chai">
        <input type="number" id="itemPrice" placeholder="Price: 20">
        <button id="mainBtn" onclick="jodoItem()">Menu Mein Jodo</button>
        
        <div id="menuList">
            <h3>Aaj Ka Menu:</h3>
        </div>
        
        <button class="btn-green" onclick="banaoQR()">Menu Ka QR Banao</button>
        <div id="qrcode"></div>
        <div id="qrLink" class="link-text"></div>
    </div>

    <script>
        // 👇 YAHAN APNI 3 CHEEZ DAALNI HAI
        const SUPABASE_URL = 'https://dvuosaxbenphiwqknwia.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2dW9zYXhiZW5waGl3cWtud2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Mzg0OTAsImV4cCI6MjA5NDMxNDQ5MH0.IqRBS68f3PFGi9mtlwRCmUeGB6999snjHSEtykraFJQ'
        const CAFE_ID = 'b4e42238-a89a-4f2e-a4a6-8c82569f6495'
        
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
        
        let menuData = [];
        let editItemId = null; // Edit ke liye
        
        // Menu load karo
        async function loadMenuFromDB() {
            const { data, error } = await db.from('menu_items').select('*').eq('cafe_id', CAFE_ID).order('id', { ascending: true })
            if (error) { 
                alert('Menu load karne mein error: ' + error.message); 
                return 
            }
            menuData = data
            document.getElementById("menuList").innerHTML = '<h3>Aaj Ka Menu:</h3>'
            data.forEach(item => {
                let nayaItem = document.createElement("div");
                nayaItem.className = "menu-item";
                nayaItem.innerHTML = `
                    <div class="item-info">
                        <b>${item.name}</b> - ₹${item.price}
                    </div>
                    <div class="item-actions">
                        <button class="btn-edit" onclick="editShuru(${item.id}, '${item.name}', ${item.price})">Edit</button>
                        <button class="btn-delete" onclick="deleteItem(${item.id})">Delete</button>
                    </div>
                `;
                document.getElementById("menuList").appendChild(nayaItem);
            })
        }
        
        // Item add ya update karo
        async function jodoItem() {
            let naam = document.getElementById("itemName").value;
            let daam = document.getElementById("itemPrice").value;
            
            if(naam == "" || daam == "") {
                alert("Bhai naam aur daam dono bhar");
                return;
            }
            
            if(editItemId) {
                // UPDATE KARO
                const { error } = await db.from('menu_items').update({ name: naam, price: daam }).eq('id', editItemId)
                if (error) { 
                    alert('Update karne mein error: ' + error.message); 
                    return 
                }
                cancelEdit();
            } else {
                // NAYA ADD KARO
                const { error } = await db.from('menu_items').insert([{ cafe_id: CAFE_ID, name: naam, price: daam }])
                if (error) { 
                    alert('Item add karne mein error: ' + error.message); 
                    return 
                }
            }
            
            loadMenuFromDB()
            document.getElementById("itemName").value = "";
            document.getElementById("itemPrice").value = "";
        }
        
        // Delete function
        async function deleteItem(id) {
            if(!confirm("Pakka delete karna hai?")) return;
            
            const { error } = await db.from('menu_items').delete().eq('id', id)
            if (error) { 
                alert('Delete karne mein error: ' + error.message); 
                return 
            }
            loadMenuFromDB()
        }
        
        // Edit mode chalu karo
        function editShuru(id, name, price) {
            editItemId = id;
            document.getElementById("itemName").value = name;
            document.getElementById("itemPrice").value = price;
            document.getElementById("mainBtn").innerText = "Update Karo";
            document.getElementById("editMode").style.display = "block";
            window.scrollTo(0, 0); // Upar le jao
        }
        
        // Edit cancel karo
        function cancelEdit() {
            editItemId = null;
            document.getElementById("itemName").value = "";
            document.getElementById("itemPrice").value = "";
            document.getElementById("mainBtn").innerText = "Menu Mein Jodo";
            document.getElementById("editMode").style.display = "none";
        }
        
        // QR Banane ka function - Ab sahi link
        function banaoQR() {
            if(menuData.length == 0) {
                alert("Pehle menu mein item to jodo bhai");
                return;
            }
            
            // Teri site ka sahi link - menu.html ki jarurat nahi
            const menuURL = 'https://digital-menu-cafe.netlify.app';
            
            document.getElementById("qrcode").innerHTML = "";
            document.getElementById("qrLink").innerHTML = "";
            
            new QRCode(document.getElementById("qrcode"), {
                text: menuURL,
                width: 200,
                height: 200,
            });
            
            document.getElementById("qrLink").innerHTML = `Link: <a href="${menuURL}" target="_blank">${menuURL}</a>`;
        }
        
        loadMenuFromDB()
    </script>
</body>
</html>
